<!doctype html>
<html>
<head>
	<meta charset="utf-8" />
	<title>sizzle.link</title>
	<link rel="stylesheet" href="/Style/sizzle.link.scss" />
	<script src="/Script/sizzle.link.js"></script>
</head>
<body>

<header>
	<h1>sizzle.link</h1>
</header>

<form action="http://upload.sizzle.link" method="post"
enctype="multipart/form-data"
title="Click to choose a file, or drag files here">
	<input type="hidden" name="AWSAccessKeyId" />
	<input type="hidden" name="acl" value="public-read" />
	<input type="hidden" name="key" value="${filename}" />
	<input type="hidden" name="policy" />
	<input type="hidden" name="signature" />
	<input type="file" name="file" />
	<button>Upload</button>
</form>

</body>
</html>
